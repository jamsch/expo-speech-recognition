name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🛠️ Run the build
        run: npm run prepare
